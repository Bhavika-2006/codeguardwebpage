<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="Inter, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="figma-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f24e1e"/>
      <stop offset="33%" stop-color="#a259ff"/>
      <stop offset="66%" stop-color="#1abcfe"/>
      <stop offset="100%" stop-color="#0acf83"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="550" fill="url(#bg)" rx="16"/>

  <!-- Figma gradient bar at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#figma-grad)"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#f24e1e" font-size="11" font-weight="700" letter-spacing="3">// FIGMA MAKE WORKFLOW</text>
  <text x="600" y="78" text-anchor="middle" fill="#f1f5f9" font-size="28" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">How We Used Figma Make</text>
  <text x="600" y="102" text-anchor="middle" fill="#94a3b8" font-size="13">From rapid ideation to validated architecture — Figma Make helped us think faster and iterate smarter</text>

  <!-- Connection line between cards -->
  <line x1="285" y1="290" x2="330" y2="290" stroke="#a259ff" stroke-width="2" stroke-dasharray="6,4" stroke-opacity="0.4"/>
  <line x1="585" y1="290" x2="630" y2="290" stroke="#1abcfe" stroke-width="2" stroke-dasharray="6,4" stroke-opacity="0.4"/>
  <line x1="885" y1="290" x2="930" y2="290" stroke="#0acf83" stroke-width="2" stroke-dasharray="6,4" stroke-opacity="0.4"/>
  <polygon points="328,285 338,290 328,295" fill="#a259ff" opacity="0.5"/>
  <polygon points="628,285 638,290 628,295" fill="#1abcfe" opacity="0.5"/>
  <polygon points="928,285 938,290 928,295" fill="#0acf83" opacity="0.5"/>

  <!-- Card 1: Ideation -->
  <g filter="url(#shadow)">
    <rect x="40" y="140" width="245" height="300" rx="16" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="40" y="140" width="245" height="5" rx="3" fill="#f24e1e"/>
    
    <circle cx="162" cy="195" r="28" fill="#f24e1e" fill-opacity="0.1" stroke="#f24e1e" stroke-width="1.5"/>
    <text x="162" y="203" text-anchor="middle" font-size="26">💡</text>
    
    <text x="162" y="245" text-anchor="middle" fill="#f24e1e" font-size="9" font-weight="700" letter-spacing="2">PHASE 1</text>
    <text x="162" y="268" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">Ideation</text>
    
    <text x="70" y="300" fill="#94a3b8" font-size="10.5">Used Figma Make to rapidly</text>
    <text x="70" y="318" fill="#94a3b8" font-size="10.5">prototype the two-pipeline</text>
    <text x="70" y="336" fill="#94a3b8" font-size="10.5">concept (Evaluate + Commit).</text>
    <text x="70" y="354" fill="#94a3b8" font-size="10.5">Mocked up the data flow</text>
    <text x="70" y="372" fill="#94a3b8" font-size="10.5">before writing any code.</text>
    
    <rect x="60" y="395" width="205" height="24" rx="6" fill="#f24e1e" fill-opacity="0.06" stroke="#f24e1e" stroke-opacity="0.2" stroke-width="1"/>
    <text x="162" y="411" text-anchor="middle" fill="#f24e1e" font-size="8.5" font-weight="600">Architecture alignment at 2am</text>
  </g>

  <!-- Card 2: Prototyping -->
  <g filter="url(#shadow)">
    <rect x="340" y="140" width="245" height="300" rx="16" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="340" y="140" width="245" height="5" rx="3" fill="#a259ff"/>
    
    <circle cx="462" cy="195" r="28" fill="#a259ff" fill-opacity="0.1" stroke="#a259ff" stroke-width="1.5"/>
    <text x="462" y="203" text-anchor="middle" font-size="26">🎨</text>
    
    <text x="462" y="245" text-anchor="middle" fill="#a259ff" font-size="9" font-weight="700" letter-spacing="2">PHASE 2</text>
    <text x="462" y="268" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">Prototyping</text>
    
    <text x="370" y="300" fill="#94a3b8" font-size="10.5">Created wireframes showing</text>
    <text x="370" y="318" fill="#94a3b8" font-size="10.5">how an intern's commit flows</text>
    <text x="370" y="336" fill="#94a3b8" font-size="10.5">through CodeGuard: from AST</text>
    <text x="370" y="354" fill="#94a3b8" font-size="10.5">diff to guideline matching to</text>
    <text x="370" y="372" fill="#94a3b8" font-size="10.5">the final review comment.</text>
    
    <rect x="360" y="395" width="205" height="24" rx="6" fill="#a259ff" fill-opacity="0.06" stroke="#a259ff" stroke-opacity="0.2" stroke-width="1"/>
    <text x="462" y="411" text-anchor="middle" fill="#a259ff" font-size="8.5" font-weight="600">Pitched the idea to team visually</text>
  </g>

  <!-- Card 3: Iteration -->
  <g filter="url(#shadow)">
    <rect x="640" y="140" width="245" height="300" rx="16" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="640" y="140" width="245" height="5" rx="3" fill="#1abcfe"/>
    
    <circle cx="762" cy="195" r="28" fill="#1abcfe" fill-opacity="0.1" stroke="#1abcfe" stroke-width="1.5"/>
    <text x="762" y="203" text-anchor="middle" font-size="26">🔄</text>
    
    <text x="762" y="245" text-anchor="middle" fill="#1abcfe" font-size="9" font-weight="700" letter-spacing="2">PHASE 3</text>
    <text x="762" y="268" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">Iteration</text>
    
    <text x="670" y="300" fill="#94a3b8" font-size="10.5">Killed retroactive history</text>
    <text x="670" y="318" fill="#94a3b8" font-size="10.5">mining early, saving 3 hours.</text>
    <text x="670" y="336" fill="#94a3b8" font-size="10.5">By mocking the pipeline flow,</text>
    <text x="670" y="354" fill="#94a3b8" font-size="10.5">realized attributes should only</text>
    <text x="670" y="372" fill="#94a3b8" font-size="10.5">accrue from PRs going forward.</text>
    
    <rect x="660" y="395" width="205" height="24" rx="6" fill="#1abcfe" fill-opacity="0.06" stroke="#1abcfe" stroke-opacity="0.2" stroke-width="1"/>
    <text x="762" y="411" text-anchor="middle" fill="#1abcfe" font-size="8.5" font-weight="600">Threw away bad ideas early</text>
  </g>

  <!-- Card 4: Delivery -->
  <g filter="url(#shadow)">
    <rect x="940" y="140" width="245" height="300" rx="16" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="940" y="140" width="245" height="5" rx="3" fill="#0acf83"/>
    
    <circle cx="1062" cy="195" r="28" fill="#0acf83" fill-opacity="0.1" stroke="#0acf83" stroke-width="1.5"/>
    <text x="1062" y="203" text-anchor="middle" font-size="26">🚀</text>
    
    <text x="1062" y="245" text-anchor="middle" fill="#0acf83" font-size="9" font-weight="700" letter-spacing="2">PHASE 4</text>
    <text x="1062" y="268" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">Delivery</text>
    
    <text x="970" y="300" fill="#94a3b8" font-size="10.5">Created team breakdown</text>
    <text x="970" y="318" fill="#94a3b8" font-size="10.5">visualization: Person A/B/C/D</text>
    <text x="970" y="336" fill="#94a3b8" font-size="10.5">with interfaces and deps.</text>
    <text x="970" y="354" fill="#94a3b8" font-size="10.5">Each person could see their</text>
    <text x="970" y="372" fill="#94a3b8" font-size="10.5">scope at a glance.</text>
    
    <rect x="960" y="395" width="205" height="24" rx="6" fill="#0acf83" fill-opacity="0.06" stroke="#0acf83" stroke-opacity="0.2" stroke-width="1"/>
    <text x="1062" y="411" text-anchor="middle" fill="#0acf83" font-size="8.5" font-weight="600">Team aligned and shipping</text>
  </g>

  <!-- Bottom quote -->
  <rect x="150" y="470" width="900" height="45" rx="10" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1"/>
  <text x="600" y="497" text-anchor="middle" fill="#94a3b8" font-size="11" font-style="italic">"Figma Make was our thinking tool, not just a design tool. We used it to iterate faster than code."</text>

  <!-- Branding -->
  <text x="600" y="540" text-anchor="middle" fill="#334155" font-size="10">CodeGuard — Figma Make Challenge | LA Hacks 2026</text>
</svg>
