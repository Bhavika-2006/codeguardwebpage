  <text x="700" y="102" text-anchor="middle" fill="#94a3b8" font-size="13">Complete module tree — click any node to explore functions and internals</text>

  <!-- CONNECTION LINES: Root to Level 1 -->
  <path d="M 700 180 C 700 230, 230 230, 230 280" stroke="#00d4ff" stroke-width="2" fill="none" stroke-opacity="0.3"/>
  <path d="M 700 180 C 700 230, 510 230, 510 280" stroke="#8b5cf6" stroke-width="2" fill="none" stroke-opacity="0.3"/>
  <path d="M 700 180 C 700 230, 860 230, 860 280" stroke="#ff006e" stroke-width="2" fill="none" stroke-opacity="0.3"/>
  <path d="M 700 180 C 700 230, 1160 230, 1160 280" stroke="#10b981" stroke-width="2" fill="none" stroke-opacity="0.3"/>

  <!-- CONNECTION LINES: Level 1 to Level 2 -->
