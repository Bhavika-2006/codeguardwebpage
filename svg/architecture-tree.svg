  <path d="M 230 390 C 230 430, 140 430, 140 470" stroke="#00d4ff" stroke-width="1.5" fill="none" stroke-opacity="0.2"/>
  <path d="M 230 390 C 230 430, 320 430, 320 470" stroke="#00d4ff" stroke-width="1.5" fill="none" stroke-opacity="0.2"/>
  <!-- Person B children -->
