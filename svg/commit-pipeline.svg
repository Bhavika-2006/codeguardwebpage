<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="Inter, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="700" letter-spacing="3">// COMMIT PIPELINE</text>
  <text x="600" y="82" text-anchor="middle" fill="#f1f5f9" font-size="28" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">How CodeGuard Learns from Merges</text>
  <text x="600" y="108" text-anchor="middle" fill="#94a3b8" font-size="13">When a PR merges, CodeGuard decides if the commit teaches a reusable lesson and stores it for future reviews</text>

  <!-- Connection lines -->
  <line x1="205" y1="270" x2="255" y2="270" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="370" y1="270" x2="420" y2="270" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="535" y1="270" x2="585" y2="270" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="700" y1="270" x2="750" y2="270" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="865" y1="270" x2="915" y2="270" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="1030" y1="270" x2="1050" y2="270" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Arrows -->
  <polygon points="253,265 263,270 253,275" fill="#8b5cf6" opacity="0.7"/>
  <polygon points="418,265 428,270 418,275" fill="#8b5cf6" opacity="0.7"/>
  <polygon points="583,265 593,270 583,275" fill="#8b5cf6" opacity="0.7"/>
  <polygon points="748,265 758,270 748,275" fill="#8b5cf6" opacity="0.7"/>
  <polygon points="913,265 923,270 913,275" fill="#8b5cf6" opacity="0.7"/>
  <polygon points="1048,265 1058,270 1048,275" fill="#8b5cf6" opacity="0.7"/>

  <!-- Step 1: PR Merges -->
  <g filter="url(#shadow)">
    <rect x="60" y="185" width="145" height="170" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="60" y="185" width="145" height="4" rx="2" fill="#10b981"/>
    <circle cx="132" cy="235" r="24" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="1.5"/>
    <text x="132" y="242" text-anchor="middle" font-size="22">✅</text>
    <text x="132" y="278" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">PR Merges</text>
    <text x="132" y="300" text-anchor="middle" fill="#64748b" font-size="9.5">Merged PR triggers</text>
    <text x="132" y="315" text-anchor="middle" fill="#64748b" font-size="9.5">learning pipeline</text>
    <text x="132" y="340" text-anchor="middle" fill="#10b981" font-size="8" font-weight="700">STEP 1</text>
  </g>

  <!-- Step 2: Diff Read -->
  <g filter="url(#shadow)">
    <rect x="225" y="185" width="145" height="170" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="225" y="185" width="145" height="4" rx="2" fill="#6366f1"/>
    <circle cx="297" cy="235" r="24" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-width="1.5"/>
    <text x="297" y="242" text-anchor="middle" font-size="22">🔄</text>
    <text x="297" y="278" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">Diff Read</text>
    <text x="297" y="300" text-anchor="middle" fill="#64748b" font-size="9.5">Read before/after</text>
    <text x="297" y="315" text-anchor="middle" fill="#64748b" font-size="9.5">function states</text>
    <text x="297" y="340" text-anchor="middle" fill="#6366f1" font-size="8" font-weight="700">STEP 2</text>
  </g>

  <!-- Step 3: Signal Extract -->
  <g filter="url(#shadow)">
    <rect x="390" y="185" width="145" height="170" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="390" y="185" width="145" height="4" rx="2" fill="#00d4ff"/>
    <circle cx="462" cy="235" r="24" fill="#00d4ff" fill-opacity="0.12" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="462" y="242" text-anchor="middle" font-size="22">📡</text>
    <text x="462" y="278" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">Signal Extract</text>
    <text x="462" y="300" text-anchor="middle" fill="#64748b" font-size="9.5">Touched layers,</text>
    <text x="462" y="315" text-anchor="middle" fill="#64748b" font-size="9.5">risky patterns, intent</text>
    <text x="462" y="340" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="700">STEP 3</text>
  </g>

  <!-- Step 4: Worth Check -->
  <g filter="url(#shadow)">
    <rect x="555" y="185" width="145" height="170" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="555" y="185" width="145" height="4" rx="2" fill="#f59e0b"/>
    <circle cx="627" cy="235" r="24" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="627" y="242" text-anchor="middle" font-size="22">🤔</text>
    <text x="627" y="278" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">Worth Check</text>
    <text x="627" y="300" text-anchor="middle" fill="#64748b" font-size="9.5">Is this commit worth</text>
    <text x="627" y="315" text-anchor="middle" fill="#64748b" font-size="9.5">remembering?</text>
    <text x="627" y="340" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="700">STEP 4</text>
  </g>

  <!-- Step 5: Classify -->
  <g filter="url(#shadow)">
    <rect x="720" y="185" width="145" height="170" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="720" y="185" width="145" height="4" rx="2" fill="#ff006e"/>
    <circle cx="792" cy="235" r="24" fill="#ff006e" fill-opacity="0.12" stroke="#ff006e" stroke-width="1.5"/>
    <text x="792" y="242" text-anchor="middle" font-size="22">➖➕</text>
    <text x="792" y="278" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">Classify</text>
    <text x="792" y="300" text-anchor="middle" fill="#64748b" font-size="9.5">Positive pattern or</text>
    <text x="792" y="315" text-anchor="middle" fill="#64748b" font-size="9.5">negative pattern</text>
    <text x="792" y="340" text-anchor="middle" fill="#ff006e" font-size="8" font-weight="700">STEP 5</text>
  </g>

  <!-- Step 6: Generate -->
  <g filter="url(#shadow)">
    <rect x="885" y="185" width="145" height="170" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="885" y="185" width="145" height="4" rx="2" fill="#b400ff"/>
    <circle cx="957" cy="235" r="24" fill="#b400ff" fill-opacity="0.12" stroke="#b400ff" stroke-width="1.5"/>
    <text x="957" y="242" text-anchor="middle" font-size="22">📝</text>
    <text x="957" y="278" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">Generate</text>
    <text x="957" y="300" text-anchor="middle" fill="#64748b" font-size="9.5">Create structured</text>
    <text x="957" y="315" text-anchor="middle" fill="#64748b" font-size="9.5">guideline + reasoning</text>
    <text x="957" y="340" text-anchor="middle" fill="#b400ff" font-size="8" font-weight="700">STEP 6</text>
  </g>

  <!-- Step 7: Store -->
  <g filter="url(#shadow)">
    <rect x="1050" y="185" width="145" height="170" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="1050" y="185" width="145" height="4" rx="2" fill="#00ff88"/>
    <circle cx="1122" cy="235" r="24" fill="#00ff88" fill-opacity="0.12" stroke="#00ff88" stroke-width="1.5"/>
    <text x="1122" y="242" text-anchor="middle" font-size="22">💾</text>
    <text x="1122" y="278" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">Store</text>
    <text x="1122" y="300" text-anchor="middle" fill="#64748b" font-size="9.5">Write to ChromaDB</text>
    <text x="1122" y="315" text-anchor="middle" fill="#64748b" font-size="9.5">pos/neg collection</text>
    <text x="1122" y="340" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="700">STEP 7</text>
  </g>

  <!-- Bottom: Example Guideline -->
  <rect x="60" y="390" width="1080" height="100" rx="12" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1"/>
  <text x="600" y="415" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="700" letter-spacing="2">EXAMPLE GUIDELINE OUTPUT</text>
  
  <text x="100" y="442" fill="#00d4ff" font-size="10" font-weight="600" font-family="JetBrains Mono, monospace">pattern_summary:</text>
  <text x="260" y="442" fill="#94a3b8" font-size="10">"Avoid broad exception handling in route files"</text>
  
  <text x="100" y="462" fill="#00d4ff" font-size="10" font-weight="600" font-family="JetBrains Mono, monospace">reasoning:</text>
  <text x="220" y="462" fill="#94a3b8" font-size="10">"Broad exception handling hides real failures and makes debugging harder for new contributors"</text>
  
  <text x="100" y="478" fill="#00d4ff" font-size="10" font-weight="600" font-family="JetBrains Mono, monospace">collection:</text>
  <text x="220" y="478" fill="#ef4444" font-size="10" font-weight="600">negative</text>
  <text x="310" y="478" fill="#00d4ff" font-size="10" font-weight="600" font-family="JetBrains Mono, monospace">confidence:</text>
  <text x="430" y="478" fill="#10b981" font-size="10" font-weight="600">high</text>
  <text x="500" y="478" fill="#00d4ff" font-size="10" font-weight="600" font-family="JetBrains Mono, monospace">applies_to:</text>
  <text x="620" y="478" fill="#94a3b8" font-size="10">["routes/*.py"]</text>

  <!-- Branding -->
  <text x="600" y="510" text-anchor="middle" fill="#334155" font-size="10">CodeGuard — Commit-Stage Learning Pipeline | LA Hacks 2026</text>
</svg>
