<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" font-family="Inter, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="520" fill="url(#bg)" rx="16"/>
  
  <!-- Title -->
  <text x="700" y="48" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="700" letter-spacing="3" text-transform="uppercase">// EVALUATE PIPELINE</text>
  <text x="700" y="82" text-anchor="middle" fill="#f1f5f9" font-size="28" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">How CodeGuard Reviews Every PR</text>
  <text x="700" y="108" text-anchor="middle" fill="#94a3b8" font-size="13">From PR open to actionable review comments — powered by AST analysis, semantic search, and LLM reasoning</text>

  <!-- Connection lines -->
  <line x1="175" y1="260" x2="225" y2="260" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="315" y1="260" x2="365" y2="260" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="455" y1="260" x2="505" y2="260" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="595" y1="260" x2="645" y2="260" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="735" y1="260" x2="785" y2="260" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="875" y1="260" x2="925" y2="260" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="1015" y1="260" x2="1065" y2="260" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="1155" y1="260" x2="1205" y2="260" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Arrow heads -->
  <polygon points="223,255 233,260 223,265" fill="#6366f1" opacity="0.7"/>
  <polygon points="363,255 373,260 363,265" fill="#6366f1" opacity="0.7"/>
  <polygon points="503,255 513,260 503,265" fill="#6366f1" opacity="0.7"/>
  <polygon points="643,255 653,260 643,265" fill="#6366f1" opacity="0.7"/>
  <polygon points="783,255 793,260 783,265" fill="#6366f1" opacity="0.7"/>
  <polygon points="923,255 933,260 923,265" fill="#6366f1" opacity="0.7"/>
  <polygon points="1063,255 1073,260 1063,265" fill="#6366f1" opacity="0.7"/>
  <polygon points="1203,255 1213,260 1203,265" fill="#6366f1" opacity="0.7"/>

  <!-- Step 1: PR Opens -->
  <g filter="url(#shadow)">
    <rect x="45" y="180" width="130" height="160" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="45" y="180" width="130" height="4" rx="2" fill="#6366f1"/>
    <circle cx="110" cy="225" r="22" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-width="1.5"/>
    <text x="110" y="232" text-anchor="middle" font-size="20">📝</text>
    <text x="110" y="268" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">PR Opens</text>
    <text x="110" y="288" text-anchor="middle" fill="#64748b" font-size="9">GitHub webhook</text>
    <text x="110" y="302" text-anchor="middle" fill="#64748b" font-size="9">triggers action</text>
    <text x="110" y="325" text-anchor="middle" fill="#6366f1" font-size="8" font-weight="600">STEP 1</text>
  </g>

  <!-- Step 2: AST Parse -->
  <g filter="url(#shadow)">
    <rect x="235" y="180" width="130" height="160" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="235" y="180" width="130" height="4" rx="2" fill="#8b5cf6"/>
    <circle cx="300" cy="225" r="22" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="300" y="232" text-anchor="middle" font-size="20">🌳</text>
    <text x="300" y="268" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">AST Parse</text>
    <text x="300" y="288" text-anchor="middle" fill="#64748b" font-size="9">tree-sitter extracts</text>
    <text x="300" y="302" text-anchor="middle" fill="#64748b" font-size="9">functions from diff</text>
    <text x="300" y="325" text-anchor="middle" fill="#8b5cf6" font-size="8" font-weight="600">STEP 2</text>
  </g>

  <!-- Step 3: Filter -->
  <g filter="url(#shadow)">
    <rect x="375" y="180" width="130" height="160" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="375" y="180" width="130" height="4" rx="2" fill="#a78bfa"/>
    <circle cx="440" cy="225" r="22" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="440" y="232" text-anchor="middle" font-size="20">🔍</text>
    <text x="440" y="268" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">Filter</text>
    <text x="440" y="288" text-anchor="middle" fill="#64748b" font-size="9">Skip whitespace,</text>
    <text x="440" y="302" text-anchor="middle" fill="#64748b" font-size="9">auto-gen, tests</text>
    <text x="440" y="325" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600">STEP 3</text>
  </g>

  <!-- Step 4: Embed -->
  <g filter="url(#shadow)">
    <rect x="515" y="180" width="130" height="160" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="515" y="180" width="130" height="4" rx="2" fill="#00d4ff"/>
    <circle cx="580" cy="225" r="22" fill="#00d4ff" fill-opacity="0.12" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="580" y="232" text-anchor="middle" font-size="20">🧠</text>
    <text x="580" y="268" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">Embed</text>
    <text x="580" y="288" text-anchor="middle" fill="#64748b" font-size="9">Generate vector</text>
    <text x="580" y="302" text-anchor="middle" fill="#64748b" font-size="9">embeddings</text>
    <text x="580" y="325" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="600">STEP 4</text>
  </g>

  <!-- Step 5: kNN Match -->
  <g filter="url(#shadow)">
    <rect x="655" y="180" width="130" height="160" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="655" y="180" width="130" height="4" rx="2" fill="#10b981"/>
    <circle cx="720" cy="225" r="22" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="1.5"/>
    <text x="720" y="232" text-anchor="middle" font-size="20">🎯</text>
    <text x="720" y="268" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">kNN Match</text>
    <text x="720" y="288" text-anchor="middle" fill="#64748b" font-size="9">Find K=5-10</text>
    <text x="720" y="302" text-anchor="middle" fill="#64748b" font-size="9">similar functions</text>
    <text x="720" y="325" text-anchor="middle" fill="#10b981" font-size="8" font-weight="600">STEP 5</text>
  </g>

  <!-- Step 6: Get Guidelines -->
  <g filter="url(#shadow)">
    <rect x="795" y="180" width="130" height="160" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="795" y="180" width="130" height="4" rx="2" fill="#f59e0b"/>
    <circle cx="860" cy="225" r="22" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="860" y="232" text-anchor="middle" font-size="20">📚</text>
    <text x="860" y="268" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">Guidelines</text>
    <text x="860" y="288" text-anchor="middle" fill="#64748b" font-size="9">Retrieve lessons</text>
    <text x="860" y="302" text-anchor="middle" fill="#64748b" font-size="9">from neighbors</text>
    <text x="860" y="325" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="600">STEP 6</text>
  </g>

  <!-- Step 7: Weight -->
  <g filter="url(#shadow)">
    <rect x="935" y="180" width="130" height="160" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="935" y="180" width="130" height="4" rx="2" fill="#ff006e"/>
    <circle cx="1000" cy="225" r="22" fill="#ff006e" fill-opacity="0.12" stroke="#ff006e" stroke-width="1.5"/>
    <text x="1000" y="232" text-anchor="middle" font-size="20">⚖️</text>
    <text x="1000" y="268" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">Weight</text>
    <text x="1000" y="288" text-anchor="middle" fill="#64748b" font-size="9">Score by similarity,</text>
    <text x="1000" y="302" text-anchor="middle" fill="#64748b" font-size="9">confidence, recency</text>
    <text x="1000" y="325" text-anchor="middle" fill="#ff006e" font-size="8" font-weight="600">STEP 7</text>
  </g>

  <!-- Step 8: LLM Check -->
  <g filter="url(#shadow)">
    <rect x="1075" y="180" width="130" height="160" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="1075" y="180" width="130" height="4" rx="2" fill="#b400ff"/>
    <circle cx="1140" cy="225" r="22" fill="#b400ff" fill-opacity="0.12" stroke="#b400ff" stroke-width="1.5"/>
    <text x="1140" y="232" text-anchor="middle" font-size="20">🤖</text>
    <text x="1140" y="268" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">LLM Check</text>
    <text x="1140" y="288" text-anchor="middle" fill="#64748b" font-size="9">Claude checks</text>
    <text x="1140" y="302" text-anchor="middle" fill="#64748b" font-size="9">compliance</text>
    <text x="1140" y="325" text-anchor="middle" fill="#b400ff" font-size="8" font-weight="600">STEP 8</text>
  </g>

  <!-- Step 9: Review -->
  <g filter="url(#shadow)">
    <rect x="1215" y="180" width="130" height="160" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="1215" y="180" width="130" height="4" rx="2" fill="#00ff88"/>
    <circle cx="1280" cy="225" r="22" fill="#00ff88" fill-opacity="0.12" stroke="#00ff88" stroke-width="1.5"/>
    <text x="1280" y="232" text-anchor="middle" font-size="20">📢</text>
    <text x="1280" y="268" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">Review</text>
    <text x="1280" y="288" text-anchor="middle" fill="#64748b" font-size="9">Post warnings with</text>
    <text x="1280" y="302" text-anchor="middle" fill="#64748b" font-size="9">dismiss buttons</text>
    <text x="1280" y="325" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="600">STEP 9</text>
  </g>

  <!-- Bottom info bar -->
  <rect x="45" y="380" width="1310" height="110" rx="12" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1"/>
  <text x="700" y="408" text-anchor="middle" fill="#6366f1" font-size="10" font-weight="700" letter-spacing="2">KEY TECHNOLOGIES</text>
  
  <rect x="100" y="425" width="120" height="30" rx="8" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="160" y="444" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">tree-sitter</text>
  
  <rect x="250" y="425" width="120" height="30" rx="8" fill="#00d4ff" fill-opacity="0.1" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="310" y="444" text-anchor="middle" fill="#00d4ff" font-size="10" font-weight="600">Embeddings</text>
  
  <rect x="400" y="425" width="120" height="30" rx="8" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
  <text x="460" y="444" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">ChromaDB</text>
  
  <rect x="550" y="425" width="120" height="30" rx="8" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="610" y="444" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">Cosine kNN</text>
  
  <rect x="700" y="425" width="120" height="30" rx="8" fill="#b400ff" fill-opacity="0.1" stroke="#b400ff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="760" y="444" text-anchor="middle" fill="#b400ff" font-size="10" font-weight="600">Claude LLM</text>
  
  <rect x="850" y="425" width="140" height="30" rx="8" fill="#ff006e" fill-opacity="0.1" stroke="#ff006e" stroke-opacity="0.3" stroke-width="1"/>
  <text x="920" y="444" text-anchor="middle" fill="#ff006e" font-size="10" font-weight="600">GitHub Actions</text>
  
  <rect x="1020" y="425" width="120" height="30" rx="8" fill="#00ff88" fill-opacity="0.1" stroke="#00ff88" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1080" y="444" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="600">Numpy</text>

  <rect x="1170" y="425" width="130" height="30" rx="8" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1235" y="444" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">Pydantic</text>

  <!-- Branding -->
  <text x="700" y="510" text-anchor="middle" fill="#334155" font-size="10">CodeGuard — AI-Powered Code Review Intelligence | LA Hacks 2026</text>
</svg>
