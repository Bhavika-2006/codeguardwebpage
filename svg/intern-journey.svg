<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 950" font-family="Inter, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="timeline-line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="25%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="75%" stop-color="#ff006e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-blue">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#00d4ff" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-purple">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#8b5cf6" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-pink">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ff006e" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="950" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="700" letter-spacing="3">// THE INTERN JOURNEY</text>
  <text x="400" y="80" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">An Intern's First Week</text>
  <text x="400" y="104" text-anchor="middle" fill="#94a3b8" font-size="12">How CodeGuard helps new contributors learn unwritten rules through experience</text>

  <!-- Timeline vertical line -->
  <rect x="96" y="140" width="3" height="770" rx="2" fill="url(#timeline-line)" opacity="0.4"/>

  <!-- Step 1: First Commit -->
  <circle cx="98" cy="170" r="12" fill="#06060f" stroke="#6366f1" stroke-width="3" filter="url(#glow-blue)"/>
  <circle cx="98" cy="170" r="5" fill="#6366f1"/>
  <g filter="url(#shadow)">
    <rect x="135" y="140" width="610" height="120" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="135" y="140" width="610" height="4" rx="2" fill="#6366f1"/>
    <text x="160" y="177" fill="#6366f1" font-size="9" font-weight="700" letter-spacing="2">DAY 1 — FIRST COMMIT</text>
    <text x="160" y="200" fill="#f1f5f9" font-size="15" font-weight="700" font-family="Space Grotesk, Inter, sans-serif">The Accidental Anti-Pattern</text>
    <text x="160" y="222" fill="#94a3b8" font-size="10.5" >The intern writes code that works, but accidentally puts business logic inside</text>
    <text x="160" y="237" fill="#94a3b8" font-size="10.5" >a route handler and uses except: to catch all errors. Tests pass, but team</text>
    <text x="160" y="252" fill="#94a3b8" font-size="10.5" >conventions are broken.</text>
  </g>

  <!-- Step 2: CodeGuard Evaluates -->
  <circle cx="98" cy="320" r="12" fill="#06060f" stroke="#8b5cf6" stroke-width="3" filter="url(#glow-purple)"/>
  <circle cx="98" cy="320" r="5" fill="#8b5cf6"/>
  <g filter="url(#shadow)">
    <rect x="135" y="290" width="610" height="130" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="135" y="290" width="610" height="4" rx="2" fill="#8b5cf6"/>
    <text x="160" y="327" fill="#8b5cf6" font-size="9" font-weight="700" letter-spacing="2">DAY 1 — CODEGUARD EVALUATES</text>
    <text x="160" y="350" fill="#f1f5f9" font-size="15" font-weight="700" font-family="Space Grotesk, Inter, sans-serif">AST Diff Catches the Pattern</text>
    <text x="160" y="372" fill="#94a3b8" font-size="10.5">CodeGuard's Evaluate pipeline extracts AST diff via tree-sitter, embeds the</text>
    <text x="160" y="387" fill="#94a3b8" font-size="10.5">changed functions, finds similar code in the knowledge base, and flags:</text>
    <rect x="160" y="398" width="540" height="18" rx="4" fill="#8b5cf6" fill-opacity="0.08"/>
    <text x="170" y="412" fill="#a78bfa" font-size="9.5" font-style="italic">"Broad exception handling hides real failures. Keep business logic in service modules."</text>
  </g>

  <!-- Step 3: The Fix -->
  <circle cx="98" cy="480" r="12" fill="#06060f" stroke="#ff006e" stroke-width="3" filter="url(#glow-pink)"/>
  <circle cx="98" cy="480" r="5" fill="#ff006e"/>
  <g filter="url(#shadow)">
    <rect x="135" y="450" width="610" height="130" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="135" y="450" width="610" height="4" rx="2" fill="#ff006e"/>
    <text x="160" y="487" fill="#ff006e" font-size="9" font-weight="700" letter-spacing="2">DAY 2 — THE FIX &amp; THE LESSON</text>
    <text x="160" y="510" fill="#f1f5f9" font-size="15" font-weight="700" font-family="Space Grotesk, Inter, sans-serif">CodeGuard Learns from the Merge</text>
    <text x="160" y="532" fill="#94a3b8" font-size="10.5">The intern fixes the PR. When it merges, the Commit pipeline compares</text>
    <text x="160" y="547" fill="#94a3b8" font-size="10.5">before/after, classifies the fix as a positive lesson, and stores:</text>
    <rect x="160" y="558" width="540" height="18" rx="4" fill="#ff006e" fill-opacity="0.08"/>
    <text x="170" y="572" fill="#ff006e" font-size="9.5" font-style="italic">"Move route logic to service layer, use specific exception types."</text>
  </g>

  <!-- Step 4: Knowledge Compounds -->
  <circle cx="98" cy="640" r="12" fill="#06060f" stroke="#00d4ff" stroke-width="3"/>
  <circle cx="98" cy="640" r="5" fill="#00d4ff"/>
  <g filter="url(#shadow)">
    <rect x="135" y="610" width="610" height="110" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="135" y="610" width="610" height="4" rx="2" fill="#00d4ff"/>
    <text x="160" y="647" fill="#00d4ff" font-size="9" font-weight="700" letter-spacing="2">DAY 5 — THE KNOWLEDGE COMPOUNDS</text>
    <text x="160" y="670" fill="#f1f5f9" font-size="15" font-weight="700" font-family="Space Grotesk, Inter, sans-serif">Memory Helps the Next Intern</text>
    <text x="160" y="692" fill="#94a3b8" font-size="10.5">Another team member makes a similar mistake. CodeGuard now has a stronger</text>
    <text x="160" y="707" fill="#94a3b8" font-size="10.5">guideline from the first intern's experience. Review is faster and contextual.</text>
  </g>

  <!-- Step 5: Confidence -->
  <circle cx="98" cy="785" r="12" fill="#06060f" stroke="#10b981" stroke-width="3"/>
  <circle cx="98" cy="785" r="5" fill="#10b981"/>
  <g filter="url(#shadow)">
    <rect x="135" y="755" width="610" height="110" rx="14" fill="#0c0c1c" stroke="#1e1e3a" stroke-width="1.5"/>
    <rect x="135" y="755" width="610" height="4" rx="2" fill="#10b981"/>
    <text x="160" y="792" fill="#10b981" font-size="9" font-weight="700" letter-spacing="2">WEEK 2 — CONFIDENCE</text>
    <text x="160" y="815" fill="#f1f5f9" font-size="15" font-weight="700" font-family="Space Grotesk, Inter, sans-serif">Contributing with Understanding</text>
    <text x="160" y="837" fill="#94a3b8" font-size="10.5">The intern now understands not just what to change, but why the system works</text>
    <text x="160" y="852" fill="#94a3b8" font-size="10.5">this way. CodeGuard provided the unwritten rules that usually take months.</text>
  </g>

  <!-- Branding -->
  <text x="400" y="920" text-anchor="middle" fill="#334155" font-size="10">CodeGuard — The Intern Journey | LA Hacks 2026</text>
</svg>
