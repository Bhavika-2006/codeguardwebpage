<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" font-family="Inter, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="650" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="700" letter-spacing="3">// TEAM STRUCTURE</text>
  <text x="600" y="78" text-anchor="middle" fill="#f1f5f9" font-size="28" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">Who Built What</text>
  <text x="600" y="102" text-anchor="middle" fill="#94a3b8" font-size="13">Four people, four roles, clean interfaces between each layer</text>

  <!-- Dependency arrow -->
  <rect x="100" y="125" width="1000" height="28" rx="6" fill="#6366f1" fill-opacity="0.04" stroke="#6366f1" stroke-opacity="0.15" stroke-width="1"/>
  <text x="600" y="143" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="600" letter-spacing="1">DEPENDENCY FLOW: A provides interfaces → B/C/D build on top → D integrates everything</text>

  <!-- Person A -->
  <g filter="url(#shadow)">
    <rect x="40" y="175" width="270" height="420" rx="16" fill="#0c0c1c" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="40" y="175" width="270" height="5" rx="3" fill="#00d4ff"/>
    
    <text x="175" y="215" text-anchor="middle" font-size="30">🗃️</text>
    <text x="175" y="245" text-anchor="middle" fill="#00d4ff" font-size="10" font-weight="700" letter-spacing="2">PERSON A</text>
    <text x="175" y="268" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">Project Context Lead</text>
    <text x="175" y="290" text-anchor="middle" fill="#64748b" font-size="10">Memory Infrastructure</text>
    
    <line x1="65" y1="305" x2="285" y2="305" stroke="#1e1e3a" stroke-width="1"/>
    
    <text x="75" y="328" fill="#94a3b8" font-size="10" line-height="1.5">Built the shared data layer:</text>
    <text x="75" y="345" fill="#94a3b8" font-size="10">ChromaDB collections, Guideline</text>
    <text x="75" y="362" fill="#94a3b8" font-size="10">schema, embedding wrapper, and</text>
    <text x="75" y="379" fill="#94a3b8" font-size="10">repo intent loader.</text>
    
    <text x="75" y="405" fill="#00d4ff" font-size="9" font-weight="700" letter-spacing="1">KEY EXPORTS</text>
    <rect x="60" y="415" width="230" height="110" rx="8" fill="#000" fill-opacity="0.3"/>
    <text x="75" y="437" fill="#00d4ff" font-size="9" font-family="JetBrains Mono, monospace">get_collections()</text>
    <text x="75" y="455" fill="#00d4ff" font-size="9" font-family="JetBrains Mono, monospace">Guideline</text>
    <text x="75" y="473" fill="#00d4ff" font-size="9" font-family="JetBrains Mono, monospace">write_guideline()</text>
    <text x="75" y="491" fill="#00d4ff" font-size="9" font-family="JetBrains Mono, monospace">get_embedding()</text>
    <text x="75" y="509" fill="#00d4ff" font-size="9" font-family="JetBrains Mono, monospace">load_intent()</text>
    
    <rect x="60" y="540" width="80" height="22" rx="6" fill="#00d4ff" fill-opacity="0.1" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1"/>
    <text x="100" y="555" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="600">ChromaDB</text>
    <rect x="150" y="540" width="75" height="22" rx="6" fill="#00d4ff" fill-opacity="0.1" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1"/>
    <text x="188" y="555" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="600">Pydantic</text>
    <rect x="235" y="540" width="60" height="22" rx="6" fill="#00d4ff" fill-opacity="0.1" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1"/>
    <text x="265" y="555" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="600">SBERT</text>
  </g>

  <!-- Person B -->
  <g filter="url(#shadow)">
    <rect x="330" y="175" width="270" height="420" rx="16" fill="#0c0c1c" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="330" y="175" width="270" height="5" rx="3" fill="#8b5cf6"/>
    
    <text x="465" y="215" text-anchor="middle" font-size="30">📚</text>
    <text x="465" y="245" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="700" letter-spacing="2">PERSON B</text>
    <text x="465" y="268" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">Learning Pipeline Lead</text>
    <text x="465" y="290" text-anchor="middle" fill="#64748b" font-size="10">Commit-Stage Learning</text>
    
    <line x1="355" y1="305" x2="575" y2="305" stroke="#1e1e3a" stroke-width="1"/>
    
    <text x="365" y="328" fill="#94a3b8" font-size="10">Builds the pipeline that turns</text>
    <text x="365" y="345" fill="#94a3b8" font-size="10">commits into reusable knowledge.</text>
    <text x="365" y="362" fill="#94a3b8" font-size="10">Filters, classifies pos/neg,</text>
    <text x="365" y="379" fill="#94a3b8" font-size="10">stores structured guidelines.</text>
    
    <text x="365" y="405" fill="#8b5cf6" font-size="9" font-weight="700" letter-spacing="1">KEY EXPORTS</text>
    <rect x="350" y="415" width="230" height="110" rx="8" fill="#000" fill-opacity="0.3"/>
    <text x="365" y="437" fill="#8b5cf6" font-size="9" font-family="JetBrains Mono, monospace">is_worth_storing()</text>
    <text x="365" y="455" fill="#8b5cf6" font-size="9" font-family="JetBrains Mono, monospace">classify()</text>
    <text x="365" y="473" fill="#8b5cf6" font-size="9" font-family="JetBrains Mono, monospace">generate_guideline_text()</text>
    <text x="365" y="491" fill="#8b5cf6" font-size="9" font-family="JetBrains Mono, monospace">run_commit_pipeline()</text>
    <text x="365" y="509" fill="#8b5cf6" font-size="9" font-family="JetBrains Mono, monospace">extract_signals()</text>
    
    <rect x="350" y="540" width="72" height="22" rx="6" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="386" y="555" text-anchor="middle" fill="#8b5cf6" font-size="8" font-weight="600">Claude</text>
    <rect x="432" y="540" width="75" height="22" rx="6" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="470" y="555" text-anchor="middle" fill="#8b5cf6" font-size="8" font-weight="600">Heuristics</text>
    <rect x="517" y="540" width="65" height="22" rx="6" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="550" y="555" text-anchor="middle" fill="#8b5cf6" font-size="8" font-weight="600">Git</text>
  </g>

  <!-- Person C -->
  <g filter="url(#shadow)">
    <rect x="620" y="175" width="270" height="420" rx="16" fill="#0c0c1c" stroke="#ff006e" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="620" y="175" width="270" height="5" rx="3" fill="#ff006e"/>
    
    <text x="755" y="215" text-anchor="middle" font-size="30">🔍</text>
    <text x="755" y="245" text-anchor="middle" fill="#ff006e" font-size="10" font-weight="700" letter-spacing="2">PERSON C</text>
    <text x="755" y="268" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">Evaluate Pipeline Lead</text>
    <text x="755" y="290" text-anchor="middle" fill="#64748b" font-size="10">PR Review Engine</text>
    
    <line x1="645" y1="305" x2="865" y2="305" stroke="#1e1e3a" stroke-width="1"/>
    
    <text x="655" y="328" fill="#94a3b8" font-size="10">Runs on every PR. Extracts AST</text>
    <text x="655" y="345" fill="#94a3b8" font-size="10">diffs, finds similar functions,</text>
    <text x="655" y="362" fill="#94a3b8" font-size="10">retrieves guidelines, runs LLM</text>
    <text x="655" y="379" fill="#94a3b8" font-size="10">compliance checks.</text>
    
    <text x="655" y="405" fill="#ff006e" font-size="9" font-weight="700" letter-spacing="1">KEY EXPORTS</text>
    <rect x="640" y="415" width="230" height="110" rx="8" fill="#000" fill-opacity="0.3"/>
    <text x="655" y="437" fill="#ff006e" font-size="9" font-family="JetBrains Mono, monospace">extract_changed_functions()</text>
    <text x="655" y="455" fill="#ff006e" font-size="9" font-family="JetBrains Mono, monospace">filter_functions()</text>
    <text x="655" y="473" fill="#ff006e" font-size="9" font-family="JetBrains Mono, monospace">find_similar_functions()</text>
    <text x="655" y="491" fill="#ff006e" font-size="9" font-family="JetBrains Mono, monospace">collect_attributes()</text>
    <text x="655" y="509" fill="#ff006e" font-size="9" font-family="JetBrains Mono, monospace">run_compliance_check()</text>
    
    <rect x="640" y="540" width="82" height="22" rx="6" fill="#ff006e" fill-opacity="0.1" stroke="#ff006e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="681" y="555" text-anchor="middle" fill="#ff006e" font-size="8" font-weight="600">tree-sitter</text>
    <rect x="732" y="540" width="65" height="22" rx="6" fill="#ff006e" fill-opacity="0.1" stroke="#ff006e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="765" y="555" text-anchor="middle" fill="#ff006e" font-size="8" font-weight="600">Numpy</text>
    <rect x="807" y="540" width="65" height="22" rx="6" fill="#ff006e" fill-opacity="0.1" stroke="#ff006e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="840" y="555" text-anchor="middle" fill="#ff006e" font-size="8" font-weight="600">Claude</text>
  </g>

  <!-- Person D -->
  <g filter="url(#shadow)">
    <rect x="910" y="175" width="270" height="420" rx="16" fill="#0c0c1c" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="910" y="175" width="270" height="5" rx="3" fill="#10b981"/>
    
    <text x="1045" y="215" text-anchor="middle" font-size="30">⚙️</text>
    <text x="1045" y="245" text-anchor="middle" fill="#10b981" font-size="10" font-weight="700" letter-spacing="2">PERSON D</text>
    <text x="1045" y="268" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="800" font-family="Space Grotesk, Inter, sans-serif">Integration Lead</text>
    <text x="1045" y="290" text-anchor="middle" fill="#64748b" font-size="10">GitHub Actions + Dashboard</text>
    
    <line x1="935" y1="305" x2="1155" y2="305" stroke="#1e1e3a" stroke-width="1"/>
    
    <text x="945" y="328" fill="#94a3b8" font-size="10">Wires everything into GitHub</text>
    <text x="945" y="345" fill="#94a3b8" font-size="10">Actions, handles PR commenting,</text>
    <text x="945" y="362" fill="#94a3b8" font-size="10">dismissal tracking, and the</text>
    <text x="945" y="379" fill="#94a3b8" font-size="10">developer-facing feedback UI.</text>
    
    <text x="945" y="405" fill="#10b981" font-size="9" font-weight="700" letter-spacing="1">KEY EXPORTS</text>
    <rect x="930" y="415" width="230" height="110" rx="8" fill="#000" fill-opacity="0.3"/>
    <text x="945" y="437" fill="#10b981" font-size="9" font-family="JetBrains Mono, monospace">post_review_comment()</text>
    <text x="945" y="455" fill="#10b981" font-size="9" font-family="JetBrains Mono, monospace">record_dismissal()</text>
    <text x="945" y="473" fill="#10b981" font-size="9" font-family="JetBrains Mono, monospace">run_codeguard_action()</text>
    <text x="945" y="491" fill="#10b981" font-size="9" font-family="JetBrains Mono, monospace">format_warning()</text>
    
    <rect x="930" y="540" width="100" height="22" rx="6" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
    <text x="980" y="555" text-anchor="middle" fill="#10b981" font-size="8" font-weight="600">GitHub API</text>
    <rect x="1040" y="540" width="68" height="22" rx="6" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
    <text x="1074" y="555" text-anchor="middle" fill="#10b981" font-size="8" font-weight="600">Actions</text>
    <rect x="1118" y="540" width="52" height="22" rx="6" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
    <text x="1144" y="555" text-anchor="middle" fill="#10b981" font-size="8" font-weight="600">YAML</text>
  </g>

  <!-- Branding -->
  <text x="600" y="630" text-anchor="middle" fill="#334155" font-size="10">CodeGuard — Team Breakdown | LA Hacks 2026</text>
</svg>
